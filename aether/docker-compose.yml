version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///aether.db
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - DEFAULT_CITY=Kolkata
    volumes:
      - ./backend/aether.db:/backend/aether.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
