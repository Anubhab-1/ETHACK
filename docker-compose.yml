version: '3.8'

services:
  # ── TimescaleDB (Time-Series, Spatial & Hypertables) ─────────────────────────
  timescaledb:
    image: timescale/timescaledb:2.13.1-pg15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=aether_national
      - POSTGRES_USER=aether
      - POSTGRES_PASSWORD=aether_secure_pass
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether -d aether_national"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j (Knowledge Graph DB) ────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.12.0-community
    ports:
      - "7474:7474" # HTTP port
      - "7687:7687" # Bolt port
    environment:
      - NEO4J_AUTH=neo4j/aether_secure_pass
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Qdrant (Vector Database for legal docs RAG) ──────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Kafka Streaming Broker (Redpanda wrapper for low overhead) ──────────────
  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.1
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://kafka:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:28082
      - --advertise-pandaproxy-addr 28082
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/redpanda/data
    restart: unless-stopped

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./aether/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/backend/data
    environment:
      - APP_ENV=production
      # By default connects to TimescaleDB inside docker network
      - DATABASE_URL=postgresql://aether:aether_secure_pass@timescaledb:5432/aether_national
      # To fall back to SQLite, uncomment the line below:
      # - DATABASE_URL=sqlite:////backend/data/aether.db
      - ALLOWED_ORIGINS=http://localhost:3000
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./aether/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tsdb_data:
  neo4j_data:
  qdrant_data:
  kafka_data:
  sqlite_data:
