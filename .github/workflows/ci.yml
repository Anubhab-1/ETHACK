name: AETHER Platform CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit-and-test:
    runs-on: ubuntu-latest

    services:
      # Optional: TimescaleDB/Postgres setup can go here if needed in production

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: 'pip' # caching pip dependencies for faster runs

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r aether/backend/requirements.txt
        # Install additional testing packages
        pip install pytest requests

    - name: Start FastAPI Backend Server
      run: |
        cd aether/backend
        python -m uvicorn app.main:app --port 8000 --host 127.0.0.1 &
        echo "Waiting 5 seconds for backend to start up..."
        sleep 5

    - name: Run Functional API Audit (27 Endpoints Check)
      run: |
        cd aether
        python audit.py

    - name: Run Backend Unit Tests
      run: |
        cd aether/backend
        pytest
