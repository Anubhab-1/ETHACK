name: AETHER CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint-and-test:
    name: Backend — Lint, Type Check, and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aether/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx ruff

      - name: Run ruff linter
        run: ruff check app/ --select E,F,W,I --ignore E501

      - name: Run pytest
        env:
          DATABASE_URL: "sqlite:///./test_aether.db"
          OPENAI_API_KEY: ""
          NVIDIA_API_KEY: ""
        run: pytest tests/ -v --tb=short

  frontend-type-check:
    name: Frontend — TypeScript Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aether/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: aether/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit
